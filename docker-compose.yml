services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: fitcoach
      POSTGRES_PASSWORD: fitcoach
      POSTGRES_DB: fitcoach
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitcoach -d fitcoach"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - fitcoach-postgres:/var/lib/postgresql/data

volumes:
  fitcoach-postgres:
