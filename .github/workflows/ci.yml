name: Backend CI (pytest + postgres)

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/**"
  push:
    branches: ["main", "develop"]
    paths:
      - "backend/**"
      - ".github/workflows/**"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fitcoach_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d fitcoach_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fitcoach_test
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/fitcoach_test
      SECRET_KEY: "123"
      JWT_SECRET_KEY: "123"
      PYTH
