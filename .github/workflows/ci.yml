name: Backend CI (pytest + postgres)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fitnessclub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d fitnessclub_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fitnessclub_test
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/fitnessclub_test
      SECRET_KEY: 123
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      JWT_SECRET_KEY: 123

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system deps (psql + libpq)
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client libpq-dev gcc

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          if [ -f backend/requirements-dev.txt ]; then pip install -r backend/requirements-dev.txt; fi
          pip install pytest pytest-cov

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U postgres -d fitnessclub_test && exit 0
            sleep 1
          done
          echo "Postgres did not become ready in time" >&2
          exit 1

      - name: Debug env + DB connectivity
        run: |
          echo "Env vars set:"
          printf '%s\n' DATABASE_URL DATABASE_URL_TEST SECRET_KEY JWT_SECRET_KEY PYTHONDONTWRITEBYTECODE PYTHONUNBUFFERED
          psql "postgresql://postgres:postgres@localhost:5432/fitnessclub_test" -c "SELECT 1;"

      - name: Run pytest (coverage)
        working-directory: backend
        run: |
          python -m pytest -q \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html
