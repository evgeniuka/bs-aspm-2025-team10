name: Backend CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fitcoach_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fitcoach_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      # Tests should use DATABASE_URL_TEST; we also set DATABASE_URL for apps that read only that.
      DATABASE_URL_TEST: postgresql+psycopg2://postgres:postgres@localhost:5432/fitcoach_test
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/fitcoach_test

      # Provide secrets so create_app() doesn't crash
      SECRET_KEY: ci-secret
      JWT_SECRET_KEY: ci-jwt-secret

      # Coverage threshold (edit if you want stricter)
      COV_FAIL_UNDER: "70"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov

      - name: Run pytest (with reports)
        working-directory: backend
        run: |
          mkdir -p reports
          pytest -q -rs \
            --junitxml=reports/junit.xml \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=html:reports/coverage_html \
            --cov-fail-under=${COV_FAIL_UNDER}

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/reports
