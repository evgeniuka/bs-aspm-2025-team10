name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify project operating contract exists
        shell: bash
        run: |
          test -f AGENTS.md
          test -f docs/FITCOACH_AGENT_ROSTER.md
          test -f docs/FITCOACH_FUNCTIONAL_QA_AGENT.md
          test -f docs/QUALITY_GATE.md
          test -f .github/pull_request_template.md
          test -f scripts/quality-gate.ps1

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fitcoach
          POSTGRES_PASSWORD: fitcoach
          POSTGRES_DB: fitcoach_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U fitcoach -d fitcoach_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      TEST_DATABASE_URL: postgresql+psycopg://fitcoach:fitcoach@localhost:5432/fitcoach_test
      DATABASE_URL: postgresql+psycopg://fitcoach:fitcoach@localhost:5432/fitcoach_test
      SECRET_KEY: test-secret-key-with-at-least-thirty-two-bytes
      FRONTEND_ORIGIN: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run migrations
        working-directory: backend
        run: alembic upgrade head
      - name: Test backend
        working-directory: backend
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Test frontend
        working-directory: frontend
        run: npm run test
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fitcoach
          POSTGRES_PASSWORD: fitcoach
          POSTGRES_DB: fitcoach_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U fitcoach -d fitcoach_e2e"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql+psycopg://fitcoach:fitcoach@localhost:5432/fitcoach_e2e
      SECRET_KEY: test-secret-key-with-at-least-thirty-two-bytes
      FRONTEND_ORIGIN: http://localhost:3000
      API_PROXY_TARGET: http://127.0.0.1:8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Migrate and seed
        working-directory: backend
        run: |
          alembic upgrade head
          python -m app.seed --reset-demo
      - name: Start backend
        working-directory: backend
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 > ../backend.log 2>&1 &
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:8000/health && exit 0
            sleep 1
          done
          cat ../backend.log
          exit 1
      - name: Install frontend
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run e2e
        working-directory: frontend
        run: npm run e2e
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            frontend/test-results
            frontend/playwright-report
            backend.log
