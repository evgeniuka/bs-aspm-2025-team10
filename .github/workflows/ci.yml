name: Backend CI (pytest + postgres + coverage)

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches: ["main", "develop"]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test-backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fitcoach_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d fitcoach_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      # Use localhost because we map ports above
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/fitcoach_test
      SECRET_KEY: test-secret-key
      JWT_SECRET_KEY: test-jwt-secret-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip wheel
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt; fi
          python -m pip install pytest pytest-cov

          # If your requirements don't include a Postgres driver, uncomment one:
          # python -m pip install psycopg2-binary
          # python -m pip install psycopg[binary]

      - name: Wait for Postgres
        working-directory: backend
        run: |
          python - <<'PY'
          import os, time
          import sys

          url = os.environ["DATABASE_URL_TEST"]
          print("DATABASE_URL_TEST:", url)

          # Try psycopg2 first, then psycopg (v3). If neither exists, just exit and let tests fail clearly.
          def try_connect():
            try:
              import psycopg2
              from urllib.parse import urlparse
              u = urlparse(url)
              conn = psycopg2.connect(
                host=u.hostname, port=u.port, user=u.username, password=u.password, dbname=u.path.lstrip("/")
              )
              conn.close()
              return True
            except Exception:
              pass

            try:
              import psycopg
              conn = psycopg.connect(url)
              conn.close()
              return True
            except Exception:
              return False

          for i in range(30):
            if try_connect():
              print("Postgres is ready.")
              sys.exit(0)
            time.sleep(1)

          raise SystemExit("Postgres did not become ready in time.")
          PY

      - name: Sanity check imports
        working-directory: backend
        run: |
          python -c "import app; print('Imported app OK:', app.__file__)"

      - name: Run tests
        working-directory: backend
        run: |
          python -m pytest
