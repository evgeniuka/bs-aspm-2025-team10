name: Backend CI (pytest + postgres)

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fitcoach_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fitcoach_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      # App secrets for tests (safe defaults)
      SECRET_KEY: test-secret
      JWT_SECRET_KEY: test-jwt-secret

      # DB for tests
      DATABASE_URL_TEST: postgresql+psycopg2://postgres:postgres@localhost:5432/fitcoach_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Run pytest
        working-directory: backend
        run: |
          python -m pytest -q --maxfail=1 --disable-warnings
