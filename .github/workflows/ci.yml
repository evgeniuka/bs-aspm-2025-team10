name: Backend CI (pytest + postgres)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fitnessclub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d fitnessclub_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fitnessclub_test
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/fitnessclub_test
      SECRET_KEY: 123
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system deps (psql + libpq)
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client libpq-dev gcc

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          if [ -f backend/requirements-dev.txt ]; then pip install -r backend/requirements-dev.txt; fi
          pip install pytest pytest-cov

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U postgres -d fitnessclub_test && exit 0
            sleep 1
          done
          echo "Postgres did not become ready in time" >&2
          exit 1

      - name: Smoke check DB connection
        run: |
          psql "postgresql://postgres:postgres@localhost:5432/fitnessclub_test" -c "SELECT 1;"

      - name: Run pytest (junit + coverage)
        working-directory: backend
        run: |
          mkdir -p reports/junit reports/coverage
          pytest -q \
            --junitxml=reports/junit/junit.xml \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:reports/coverage/coverage.xml \
            --cov-report=html:reports/coverage/html \
            --cov-fail-under=60

      - name: Add summary (coverage)
        working-directory: backend
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET
          p = "reports/coverage/coverage.xml"
          root = ET.parse(p).getroot()
          rate = float(root.attrib.get("line-rate", 0.0)) * 100
          with open("reports/coverage/coverage.txt", "w", encoding="utf-8") as f:
            f.write(f"Coverage: {rate:.1f}%\n")
          PY
          echo "## Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "- JUnit: backend/reports/junit/junit.xml" >> "$GITHUB_STEP_SUMMARY"
          echo "- Coverage: $(cat reports/coverage/coverage.txt)" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload reports (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            backend/reports/junit/junit.xml
            backend/reports/coverage/coverage.xml
            backend/reports/coverage/coverage.txt
            backend/reports/coverage/html
