name: Backend CI (pytest + postgres)

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/**"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fitcoach_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d fitcoach_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL_TEST: postgresql+psycopg2://postgres:postgres@localhost:5432/fitcoach_test
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/fitcoach_test
      SECRET_KEY: test-secret
      JWT_SECRET_KEY: test-jwt-secret

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest (with coverage)
        working-directory: backend
        run: |
          pytest -q --cov=. --cov-report=term-missing --cov-report=xml --cov-report=html --cov-fail-under=70
